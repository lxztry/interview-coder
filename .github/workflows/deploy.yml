name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install flask

      - name: Create data directory
        run: mkdir -p data

      - name: Initialize database
        run: python -c "
import sqlite3, os
os.makedirs('data', exist_ok=True)
conn = sqlite3.connect('data/interview.db')
c = conn.cursor()
c.execute('''CREATE TABLE IF NOT EXISTS questions
  (id INTEGER PRIMARY KEY AUTOINCREMENT,
   dimension TEXT, level TEXT, title TEXT, content TEXT,
   hints TEXT, grading TEXT, tags TEXT,
   created_at DATETIME DEFAULT CURRENT_TIMESTAMP)''')
c.execute('''CREATE TABLE IF NOT EXISTS papers
  (id INTEGER PRIMARY KEY AUTOINCREMENT,
   title TEXT, description TEXT, questions TEXT,
   created_at DATETIME DEFAULT CURRENT_TIMESTAMP)''')
c.execute('''CREATE TABLE IF NOT EXISTS candidates
  (id INTEGER PRIMARY KEY AUTOINCREMENT,
   name TEXT, email TEXT, phone TEXT,
   position TEXT, status TEXT, notes TEXT,
   created_at DATETIME DEFAULT CURRENT_TIMESTAMP)''')
conn.commit()
conn.close()
print('DB initialized')
"

      - name: Commit DB
        run: |
          git add data/
          git diff --cached --quiet || git commit -m "Initialize database"

      - name: Upload Pages artifact
        run: |
          mkdir -p dist
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Interview Coder</title></head><body><h1>Interview Coder</h1><p>Flask app - run locally</p></body></html>' > dist/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4