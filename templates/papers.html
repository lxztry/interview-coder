<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>试卷管理 - 面试出题系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav a { padding: 10px 20px; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px; color: #888; text-decoration: none; }
        .nav a:hover, .nav a.active { color: #4a9eff; border-color: #4a9eff; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { font-size: 1.8em; color: #fff; }
        button { padding: 10px 20px; background: #4a9eff; border: none; border-radius: 8px; color: #fff; cursor: pointer; font-weight: 600; }
        button:hover { background: #3a8eef; }
        .btn-secondary { background: #2a2a4a; }
        .btn-danger { background: #ff4a4a; }
        .btn-success { background: #4aff4a; color: #000; }
        .paper-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .paper-card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 20px; }
        .paper-title { font-size: 1.2em; color: #fff; font-weight: 600; margin-bottom: 10px; }
        .paper-desc { color: #888; margin-bottom: 15px; font-size: 0.9em; }
        .paper-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .tag { padding: 4px 12px; border-radius: 20px; font-size: 0.8em; }
        .tag-diff-easy { background: #2a4a2a; color: #4aff4a; }
        .tag-diff-medium { background: #4a3a2a; color: #ffaa4a; }
        .tag-diff-hard { background: #4a2a2a; color: #ff4a4a; }
        .paper-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .paper-actions button { padding: 6px 12px; font-size: 0.85em; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 30px; max-width: 800px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #888; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px; color: #e0e0e0; }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .question-picker { max-height: 400px; overflow-y: auto; border: 1px solid #2a2a4a; border-radius: 8px; padding: 15px; }
        .question-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-bottom: 1px solid #2a2a4a; }
        .question-item:last-child { border-bottom: none; }
        .question-item input[type="checkbox"] { width: 18px; height: 18px; }
        .question-info { flex: 1; }
        .question-info .title { color: #fff; }
        .question-info .meta { font-size: 0.8em; color: #888; margin-top: 3px; }
        .selected-list { margin-top: 15px; padding: 15px; background: #0f0f1a; border-radius: 8px; }
        .selected-item { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #1a1a2e; margin-bottom: 5px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="/">首页</a>
            <a href="/questions">题库管理</a>
            <a href="/papers" class="active">试卷管理</a>
            <a href="/candidates">候选人</a>
            <a href="/ai-assist">AI助手</a>
        </nav>
        
        <div class="header">
            <h1>📋 试卷管理</h1>
            <button onclick="openModal()">+ 创建试卷</button>
        </div>
        
        <div id="paper-grid" class="paper-grid"></div>
    </div>
    
    <!-- 创建/编辑试卷 Modal -->
    <div id="paper-modal" class="modal">
        <div class="modal-content">
            <h2 id="modal-title" style="color:#fff;margin-bottom:20px;">创建试卷</h2>
            <form id="paper-form">
                <input type="hidden" id="paper-id">
                <div class="form-group">
                    <label>试卷名称</label>
                    <input type="text" id="p-name" required placeholder="如：后端高级工程师面试卷">
                </div>
                <div class="form-group">
                    <label>描述 (可选)</label>
                    <textarea id="p-desc" placeholder="描述此试卷的考察重点"></textarea>
                </div>
                <div class="form-group">
                    <label>难度</label>
                    <select id="p-difficulty">
                        <option value="easy">简单</option>
                        <option value="medium" selected>中等</option>
                        <option value="hard">困难</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>选择题目</label>
                    <div class="question-picker" id="question-picker"></div>
                    <div class="selected-list">
                        <strong style="color:#888;">已选题目：</strong>
                        <div id="selected-questions"></div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit">保存试卷</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let papers = [];
        let allQuestions = [];
        let selectedIds = [];
        
        async function loadPapers() {
            const res = await fetch('/api/papers');
            papers = await res.json();
            renderPapers();
        }
        
        async function loadAllQuestions() {
            const res = await fetch('/api/questions');
            allQuestions = await res.json();
        }
        
        function renderPapers() {
            const grid = document.getElementById('paper-grid');
            if (!papers.length) {
                grid.innerHTML = '<p style="color:#888;text-align:center;padding:40px;grid-column:1/-1;">暂无试卷，请创建</p>';
                return;
            }
            grid.innerHTML = papers.map(p => {
                const qids = JSON.parse(p.question_ids || '[]');
                const diffClass = p.difficulty === 'easy' ? 'tag-diff-easy' : p.difficulty === 'hard' ? 'tag-diff-hard' : 'tag-diff-medium';
                return `
                <div class="paper-card">
                    <div class="paper-title">${escapeHtml(p.name)}</div>
                    <div class="paper-desc">${escapeHtml(p.description || '无描述')}</div>
                    <div class="paper-meta">
                        <span class="tag ${diffClass}">${p.difficulty === 'easy' ? '简单' : p.difficulty === 'hard' ? '困难' : '中等'}</span>
                        <span class="tag" style="background:#2a2a4a;color:#888;">${qids.length} 道题</span>
                    </div>
                    <div class="paper-actions">
                        <button class="btn-success" onclick="exportPaper(${p.id})">导出</button>
                        <button class="btn-danger" onclick="deletePaper(${p.id})">删除</button>
                    </div>
                </div>
            `}).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
        
        async function openModal(paperId = null) {
            await loadAllQuestions();
            document.getElementById('paper-modal').classList.add('active');
            
            const picker = document.getElementById('question-picker');
            picker.innerHTML = allQuestions.map(q => `
                <div class="question-item">
                    <input type="checkbox" id="q-${q.id}" value="${q.id}" onchange="toggleQuestion(${q.id})">
                    <div class="question-info">
                        <div class="title">${escapeHtml(q.title)}</div>
                        <div class="meta">${q.dimension} · ${q.level}</div>
                    </div>
                </div>
            `).join('');
            
            if (paperId) {
                const res = await fetch(`/api/papers/${paperId}`);
                const paper = await res.json();
                document.getElementById('paper-id').value = paper.id;
                document.getElementById('p-name').value = paper.name;
                document.getElementById('p-desc').value = paper.description || '';
                document.getElementById('p-difficulty').value = paper.difficulty || 'medium';
                selectedIds = JSON.parse(paper.question_ids || '[]');
                selectedIds.forEach(id => {
                    const cb = document.getElementById(`q-${id}`);
                    if (cb) cb.checked = true;
                });
            } else {
                document.getElementById('paper-form').reset();
                selectedIds = [];
            }
            renderSelected();
        }
        
        function closeModal() {
            document.getElementById('paper-modal').classList.remove('active');
        }
        
        function toggleQuestion(id) {
            const idx = selectedIds.indexOf(id);
            if (idx > -1) selectedIds.splice(idx, 1);
            else selectedIds.push(id);
            renderSelected();
        }
        
        function renderSelected() {
            const container = document.getElementById('selected-questions');
            if (!selectedIds.length) {
                container.innerHTML = '<p style="color:#666;font-size:0.9em;margin-top:10px;">未选择任何题目</p>';
                return;
            }
            container.innerHTML = selectedIds.map(id => {
                const q = allQuestions.find(q => q.id === id);
                return `<div class="selected-item">
                    <span>${q ? escapeHtml(q.title) : `题目 #${id}`}</span>
                    <button onclick="toggleQuestion(${id});document.getElementById('q-${id}').checked=false;" style="padding:2px 8px;font-size:0.8em;background:#ff4a4a;">移除</button>
                </div>`;
            }).join('');
        }
        
        async function deletePaper(id) {
            if (!confirm('确定删除这份试卷？')) return;
            await fetch(`/api/papers/${id}`, { method: 'DELETE' });
            loadPapers();
        }
        
        async function exportPaper(id) {
            const res = await fetch(`/api/export/paper/${id}`);
            const data = await res.json();
            const blob = new Blob([data.markdown], { type: 'text/markdown' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = data.filename;
            a.click();
        }
        
        document.getElementById('paper-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('paper-id').value;
            const data = {
                name: document.getElementById('p-name').value,
                description: document.getElementById('p-desc').value,
                difficulty: document.getElementById('p-difficulty').value,
                question_ids: selectedIds
            };
            
            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/papers/${id}` : '/api/papers';
            await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            closeModal();
            loadPapers();
        };
        
        loadPapers();
    </script>
</body>
</html>
