<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>候选人管理 - 面试出题系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1a; color: #e0e0e0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav a { padding: 10px 20px; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 8px; color: #888; text-decoration: none; }
        .nav a:hover, .nav a.active { color: #4a9eff; border-color: #4a9eff; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { font-size: 1.8em; color: #fff; }
        button { padding: 10px 20px; background: #4a9eff; border: none; border-radius: 8px; color: #fff; cursor: pointer; font-weight: 600; }
        button:hover { background: #3a8eef; }
        .btn-secondary { background: #2a2a4a; }
        .btn-danger { background: #ff4a4a; }
        .btn-success { background: #4aff4a; color: #000; }
        .candidate-table { width: 100%; border-collapse: collapse; }
        .candidate-table th, .candidate-table td { padding: 15px; text-align: left; border-bottom: 1px solid #2a2a4a; }
        .candidate-table th { color: #888; font-weight: 600; font-size: 0.85em; text-transform: uppercase; }
        .candidate-table tr:hover { background: #1a1a2e; }
        .candidate-table td:first-child { color: #fff; font-weight: 600; }
        .status { padding: 4px 12px; border-radius: 20px; font-size: 0.85em; }
        .status-pending { background: #2a4a2a; color: #4aff4a; }
        .status-doing { background: #4a3a2a; color: #ffaa4a; }
        .status-done { background: #2a4a6a; color: #4a9eff; }
        .action-btns { display: flex; gap: 10px; }
        .action-btns button { padding: 6px 12px; font-size: 0.85em; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100; }
        .modal.active { display: flex; }
        .modal-content { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 30px; max-width: 500px; width: 90%; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #888; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 8px; color: #e0e0e0; }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="nav">
            <a href="/">首页</a>
            <a href="/questions">题库管理</a>
            <a href="/papers">试卷管理</a>
            <a href="/candidates" class="active">候选人</a>
            <a href="/ai-assist">AI助手</a>
        </nav>
        
        <div class="header">
            <h1>👥 候选人管理</h1>
            <button onclick="openModal()">+ 添加候选人</button>
        </div>
        
        <table class="candidate-table">
            <thead>
                <tr>
                    <th>姓名</th>
                    <th>应聘职位</th>
                    <th>试卷</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="candidate-tbody"></tbody>
        </table>
    </div>
    
    <!-- 添加候选人 Modal -->
    <div id="candidate-modal" class="modal">
        <div class="modal-content">
            <h2 style="color:#fff;margin-bottom:20px;">添加候选人</h2>
            <form id="candidate-form">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="c-name" required placeholder="候选人姓名">
                </div>
                <div class="form-group">
                    <label>应聘职位</label>
                    <input type="text" id="c-position" required placeholder="如：后端工程师">
                </div>
                <div class="form-group">
                    <label>分配试卷 (可选)</label>
                    <select id="c-paper">
                        <option value="">暂不分配</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit">添加</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let candidates = [];
        let papers = [];
        
        async function loadCandidates() {
            const res = await fetch('/api/candidates');
            candidates = await res.json();
            renderCandidates();
        }
        
        async function loadPapers() {
            const res = await fetch('/api/papers');
            papers = await res.json();
        }
        
        function renderCandidates() {
            const tbody = document.getElementById('candidate-tbody');
            if (!candidates.length) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#888;padding:40px;">暂无候选人</td></tr>';
                return;
            }
            tbody.innerHTML = candidates.map(c => {
                const statusClass = c.status === 'done' ? 'status-done' : c.status === 'doing' ? 'status-doing' : 'status-pending';
                const statusText = c.status === 'done' ? '已完成' : c.status === 'doing' ? '进行中' : '待开始';
                return `
                <tr>
                    <td>${escapeHtml(c.name)}</td>
                    <td>${escapeHtml(c.position)}</td>
                    <td>${c.paper_name || '未分配'}</td>
                    <td><span class="status ${statusClass}">${statusText}</span></td>
                    <td class="action-btns">
                        <button class="btn-secondary" onclick="location.href='/evaluate/${c.id}'">评分</button>
                        <button class="btn-danger" onclick="deleteCandidate(${c.id})">删除</button>
                    </td>
                </tr>
            `}).join('');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }
        
        async function openModal() {
            await loadPapers();
            const select = document.getElementById('c-paper');
            select.innerHTML = '<option value="">暂不分配</option>' + 
                papers.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
            document.getElementById('candidate-modal').classList.add('active');
        }
        
        function closeModal() {
            document.getElementById('candidate-modal').classList.remove('active');
        }
        
        async function deleteCandidate(id) {
            if (!confirm('确定删除？')) return;
            await fetch(`/api/candidates/${id}`, { method: 'DELETE' });
            loadCandidates();
        }
        
        document.getElementById('candidate-form').onsubmit = async (e) => {
            e.preventDefault();
            const data = {
                name: document.getElementById('c-name').value,
                position: document.getElementById('c-position').value,
                paper_id: document.getElementById('c-paper').value || null
            };
            await fetch('/api/candidates', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            closeModal();
            loadCandidates();
        };
        
        loadCandidates();
    </script>
</body>
</html>
